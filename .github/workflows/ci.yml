# CI aligné avec Doc/Skillhub backlog (S3) : install → lint → tests back → tests front → build → images Docker (tag SHA).
# CD (push GHCR) : uniquement sur push vers main — nécessite permissions packages: write (GITHUB_TOKEN).

name: CI Pipeline

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev

permissions:
  contents: read

jobs:
  backend:
    name: Backend — Install & Test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: skillhub_back

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: mbstring, xml, pdo_sqlite, sqlite3, bcmath, intl
          coverage: none

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Copy environment
        run: cp .env.example .env

      - name: Generate APP_KEY
        run: php artisan key:generate

      - name: Run PHPUnit (Unit + Feature)
        run: |
          mkdir -p reports
          ./vendor/bin/phpunit --log-junit reports/junit.xml

      - name: Upload PHPUnit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phpunit-junit
          path: skillhub_back/reports/junit.xml

  frontend:
    name: Frontend — Install, Lint, Test & Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: skillhub_front

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: skillhub_front/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests (Vitest)
        run: npm run test

      - name: Production build
        run: npm run build

  # Stack locale = 4 services (cf. docker-compose.yml) :
  # - api + frontend : images construites depuis les Dockerfiles du dépôt
  # - mysql + mongo : images officielles (pull Docker Hub), pas de Dockerfile projet
  docker-images:
    name: Docker — Stack 4 services (build 2 + pull 2)
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Valider docker-compose.yml
        run: docker compose -f docker-compose.yml config --quiet

      - name: Images officielles MySQL & Mongo (2/4 services — pas de Dockerfile projet)
        run: docker compose -f docker-compose.yml pull mysql mongo

      - name: Build images custom api & frontend (2/4 services — Dockerfiles du repo)
        run: |
          docker build -t skillhub-api:${{ github.sha }} ./skillhub_back
          docker build \
            -t skillhub-front:${{ github.sha }} \
            --build-arg VITE_API_URL=/api \
            ./skillhub_front

  docker-push-ghcr:
    name: CD — Push images to GHCR (main only)
    runs-on: ubuntu-latest
    needs: [docker-images]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Registry namespace (GHCR exige minuscules)
        id: ghcr
        run: echo "owner_lc=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Build & push API image
        run: |
          IMAGE_API=ghcr.io/${{ steps.ghcr.outputs.owner_lc }}/skillhub-api
          docker build -t "${IMAGE_API}:${{ github.sha }}" -t "${IMAGE_API}:latest" ./skillhub_back
          docker push "${IMAGE_API}:${{ github.sha }}"
          docker push "${IMAGE_API}:latest"

      - name: Build & push frontend image
        run: |
          IMAGE_FRONT=ghcr.io/${{ steps.ghcr.outputs.owner_lc }}/skillhub-front
          docker build \
            -t "${IMAGE_FRONT}:${{ github.sha }}" \
            -t "${IMAGE_FRONT}:latest" \
            --build-arg VITE_API_URL=/api \
            ./skillhub_front
          docker push "${IMAGE_FRONT}:${{ github.sha }}"
          docker push "${IMAGE_FRONT}:latest"
