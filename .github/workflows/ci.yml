name: CI Pipeline

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev

jobs:
  # ─── BACKEND Laravel ───────────────────────────
  backend:
    name: Backend - Install, Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Install dependencies
        working-directory: skillhub_back
        run: composer install

      - name: Copy .env
        working-directory: skillhub_back
        run: cp .env.example .env

      - name: Generate APP_KEY
        working-directory: skillhub_back
        run: php artisan key:generate

      - name: Run PHPUnit tests
        working-directory: skillhub_back
        run: php artisan test --testsuite=Unit

  # ─── FRONTEND React ────────────────────────────
  frontend:
    name: Frontend - Install, Lint & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: skillhub_front
        run: npm install

      - name: Lint
        working-directory: skillhub_front
        run: npm run lint

      - name: Build
        working-directory: skillhub_front
        run: npm run build

  # ─── BUILD IMAGE Docker ────────────────────────
  build-image:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build backend image
        continue-on-error: true
        run: |
          docker build -t skillhub-api:${{ github.sha }} ./skillhub_back