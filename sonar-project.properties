sonar.projectKey=mirija-712_skillhub-groupe-DAS
sonar.organization=mirija-712
sonar.projectName=SkillHub Groupe DAS

# Sources analysées
sonar.sources=skillhub_back/app,skillhub_front/src
sonar.tests=skillhub_back/tests,skillhub_front/src/test

# Exclusions : vendor, node_modules, fichiers générés
sonar.exclusions=\
  skillhub_back/vendor/**,\
  skillhub_front/node_modules/**,\
  skillhub_front/dist/**,\
  skillhub_front/src/test/**,\
  skillhub_back/public/**,\
  skillhub_back/storage/**,\
  skillhub_back/bootstrap/cache/**

# Exclusions de coverage : composants UI React (JSX) non couverts par les tests unitaires
# SonarCloud n'utilise que les rapports lcov/clover pour calculer la couverture
sonar.coverage.exclusions=\
  skillhub_front/src/**/*.jsx,\
  skillhub_front/src/**/*.css,\
  skillhub_front/src/main.jsx

# Rapports de couverture
sonar.php.coverage.reportPaths=skillhub_back/reports/clover.xml
sonar.javascript.lcov.reportPaths=skillhub_front/coverage/lcov.info

# Encodage du sonar
sonar.sourceEncoding=UTF-8
